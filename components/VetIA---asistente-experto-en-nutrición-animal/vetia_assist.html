<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetIA - Módulo de Captura</title>
    <style>
        /* Estilos base para simular la interfaz de VetIA */
        body { font-family: sans-serif; background-color: #1e1e1e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { display: flex; align-items: center; background: #2d2d2d; padding: 10px; border-radius: 25px; width: 90%; max-width: 500px; }
        .chat-input { flex-grow: 1; background: transparent; border: none; color: white; padding: 10px; font-size: 16px; outline: none; }
        .action-btn { background: #00d2ff; color: #000; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; user-select: none; touch-action: none; /* Crucial para evitar scroll al mantener presionado en móviles */ }
        
        /* Feedback visual crítico para terreno */
        .action-btn.recording { background: #ff4757; color: white; transform: scale(1.1); box-shadow: 0 0 15px rgba(255, 71, 87, 0.6); }
    </style>
</head>
<body>

<div class="chat-container">
    <input type="text" id="chat-input" class="chat-input" placeholder="Escribe o mantén para hablar...">
    <button id="action-btn" class="action-btn" data-mode="audio">🎤/▶</button>
</div>

<script>
    const inputArea = document.getElementById('chat-input');
    const actionBtn = document.getElementById('action-btn');
    
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    // 1. Lógica de Cambio de Estado (Texto vs Audio)
    inputArea.addEventListener('input', (e) => {
        if(e.target.value.trim().length > 0) {
            actionBtn.dataset.mode = 'text';
            actionBtn.innerHTML = 'Enviar';
            actionBtn.style.borderRadius = '15px'; // Cambio visual sutil
        } else {
            actionBtn.dataset.mode = 'audio';
            actionBtn.innerHTML = '🎤/▶';
            actionBtn.style.borderRadius = '50%';
        }
    });

    // 2. Interceptor de Teclado (Enter)
    inputArea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && inputArea.value.trim().length > 0) {
            enviarTexto(inputArea.value);
        }
    });

    // 3. Eventos Pointer para unificación (Presionar)
    actionBtn.addEventListener('pointerdown', async (e) => {
        // Si está en modo texto, no iniciamos grabación. El envío se maneja en el pointerup.
        if (actionBtn.dataset.mode === 'text') return; 

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
            isRecording = true;
            audioChunks = [];

            actionBtn.classList.add('recording');
            actionBtn.innerHTML = 'Rec...';

            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
                enviarAudio(audioBlob);
                
                // Apagar el micrófono del dispositivo por seguridad
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
        } catch (err) {
            console.error("Fallo de hardware o permisos denegados:", err);
            alert("No se pudo acceder al micrófono. Revisa los permisos.");
        }
    });

    // 4. Eventos Pointer para soltar/enviar
    actionBtn.addEventListener('pointerup', (e) => {
        if (actionBtn.dataset.mode === 'text') {
            enviarTexto(inputArea.value);
        } else if (isRecording && actionBtn.dataset.mode === 'audio') {
            detenerGrabacion();
        }
    });

    // 5. Cancelación segura (si el dedo resbala fuera del botón)
    actionBtn.addEventListener('pointercancel', () => {
        if (isRecording) detenerGrabacion(); // Dependiendo de la regla, aquí podríamos descartar el audio en vez de enviarlo.
    });

    actionBtn.addEventListener('pointerleave', () => {
        if (isRecording) detenerGrabacion();
    });

    // Funciones Auxiliares de Ejecución
    function detenerGrabacion() {
        if(mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
        isRecording = false;
        actionBtn.classList.remove('recording');
        actionBtn.innerHTML = '🎤/▶';
    }

    function enviarTexto(texto) {
        console.log("PAYLOAD TEXTO LISTO PARA GEMINI:", texto);
        // Aquí irá la conexión con tu backend o API
        inputArea.value = ''; // Limpiar input
        actionBtn.dataset.mode = 'audio'; // Resetear botón
        actionBtn.innerHTML = '🎤/▶';
        actionBtn.style.borderRadius = '50%';
    }

    function enviarAudio(blob) {
        console.log("PAYLOAD AUDIO LISTO PARA GEMINI. Tamaño (bytes):", blob.size);
        // Aquí inyectaremos el archivo al prompt multimodal de Gemini (Etapa 3)
    }
</script>

</body>
</html>
